# K8s Secret template for BioOrchestrator API keys.
# Apply BEFORE deploying the module:
#   kubectl apply -f secret.yaml -n nekazari
#
# In production, these values should come from a sealed-secret
# or an external secret manager (Vault, SOPS, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: bioorchestrator-secrets
  namespace: nekazari
  labels:
    app.kubernetes.io/name: bioorchestrator
    app.kubernetes.io/part-of: nekazari
type: Opaque
stringData:
  # Neo4j credentials
  neo4j-auth: "neo4j/bioorchestrator"

  # Required
  EPPO_API_TOKEN: ""

  # IUCN_API_TOKEN: REMOVED — license incompatible with SaaS commercial use (apply real token via kubectl, never commit)

  # DAD-IS Interoperability API, FAO (apply real token via kubectl, never commit)
  bioorchestrator-dadis-token: ""

  # Keycloak JWT validation
  KEYCLOAK_JWKS_URL: "https://auth.robotika.cloud/auth/realms/nekazari/protocol/openid-connect/certs"
  KEYCLOAK_CLIENT_ID: "nekazari-frontend"
