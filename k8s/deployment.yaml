apiVersion: apps/v1
kind: Deployment
metadata:
  name: bioorchestrator-backend
  namespace: nekazari
  labels:
    app.kubernetes.io/name: bioorchestrator
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: nekazari
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bioorchestrator
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bioorchestrator
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/nkz-os/bioorchestrator-backend:16f7b6c92832bd76eefc6012c9cd01a873193142  # CI auto-bump on push
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8420
              protocol: TCP
          envFrom:
            - secretRef:
                name: bioorchestrator-secrets
          env:
            - name: NEO4J_URI
              value: "bolt://bioorchestrator-neo4j:7687"
            - name: AUTH_DISABLED
              value: "false"
            - name: AUTH_STRICT
              value: "true"
            - name: DADIS_API_URL
              value: "https://us-central1-fao-dadis-dev.cloudfunctions.net/api/v1"
            - name: DADIS_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bioorchestrator-secrets
                  key: bioorchestrator-dadis-token
            - name: DATA_DIR
              value: "/data"
            - name: TIMESCALE_DSN
              valueFrom:
                secretKeyRef:
                  name: timescale-secret
                  key: connection-string
            - name: LOG_LEVEL
              value: "info"
            - name: CUE_API_URL
              value: "http://cue-service:5000"
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-service-secret
                  key: INTERNAL_SERVICE_SECRET
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8420
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8420
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: bioorchestrator-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bioorchestrator-data
  namespace: nekazari
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
