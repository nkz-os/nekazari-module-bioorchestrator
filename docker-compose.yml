services:
  neo4j:
    build:
      context: ./backend/neo4j
      dockerfile: Dockerfile
    container_name: bioorchestrator-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-bioorchestrator}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,n10s.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,n10s.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data/processed:/import/ikerketa:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bioorchestrator-backend
    ports:
      - "8420:8420"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-bioorchestrator}
      AUTH_DISABLED: ${AUTH_DISABLED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174}
      IKERKETA_DATA_DIR: /data/processed
    volumes:
      - ./data/processed:/data/processed:ro
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
