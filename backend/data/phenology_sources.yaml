# Phenology Parameters — Seed Data
#
# Sources:
#   FAO-56: Allen et al. (1998). Crop evapotranspiration.
#           https://doi.org/10.1016/B978-0-12-813995-6.00008-X
#
# Graph model:
#   (:Species)-[:HAS_STAGE]->(:PhenologyStage)-[:HAS_PARAMETER]->(:PhenologyParams)
#
# This YAML is consumed by scripts/seed_phenology.py.
#
# NOTE on d1/d2 units:
#   d1 = days from planting to stage onset
#   d2 = days from planting to stage end


stage_detection:

