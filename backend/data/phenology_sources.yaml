            d1: 105
            d2: 180
            mds_ref: 150
            source:
              doi: "10.1016/B978-0-12-813995-6.00008-X"
              short: "FAO-56"
              author: "Allen et al."
              year: 1998
              institution: "FAO"
              method: "FAO-56 Table 12"
              conditions: "Semi-arid, no stress"
      - name: "late-season"
