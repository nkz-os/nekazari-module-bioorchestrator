# =============================================================================
# Rotation Constraints — crop rotation minimum intervals and reasons
# =============================================================================

rotation_constraints:

  - crop_a: wheat
    crop_b: wheat
    interval_years: 2
    reason: "Common root pathogens (Gaeumannomyces graminis — take-all)"
    source_short: "FAO Crop Rotation Guidelines"

  - crop_a: wheat
    crop_b: sunflower
    interval_years: 3
    reason: "Shared soil-borne pathogens (Sclerotinia sclerotiorum)"
    source_short: "FAO Crop Rotation Guidelines"

  - crop_a: wheat
    crop_b: legume
    interval_years: 0
    reason: "Beneficial: wheat consumes N, legume fixes N — complementary"
    source_short: "FAO Crop Rotation Guidelines"

  - crop_a: almond
    crop_b: almond
    interval_years: 0
    reason: "Perennial tree crop — no rotation constraint"
    source_short: "Standard practice"

  - crop_a: olive
    crop_b: olive
    interval_years: 0
    reason: "Perennial tree crop — no rotation constraint"
    source_short: "Standard practice"

  - crop_a: grapevine
    crop_b: grapevine
    interval_years: 0
    reason: "Perennial vine — no rotation constraint"
    source_short: "Standard practice"

