# Phenology Parameters — Seed Data
#
# Sources:
#   FAO-56: Allen et al. (1998). Crop evapotranspiration.
#           https://doi.org/10.1016/B978-0-12-813995-6.00008-X
#
# Graph model:
#   (:Species)-[:HAS_STAGE]->(:PhenologyStage)-[:HAS_PARAMETER]->(:PhenologyParams)
#
# This YAML is consumed by scripts/seed_phenology.py.
#
# NOTE on d1/d2 units:
#   d1 = days from planting to stage onset
#   d2 = days from planting to stage end

stage_detection: {}

species:
  # ── Triticum aestivum (Wheat) ──────────────────────────────────────────
  - name: "wheat"
    scientific_name: "Triticum aestivum"
    agrovoc_uri: "http://aims.fao.org/aos/agrovoc/c_7951"
    stages:
      - name: "initial"
        description: "From planting to 10% ground cover"
        parameters:
          - kc: 0.30
            d1: 15
            d2: 45
            mds_ref: 80
            source:
              doi: "10.1016/B978-0-12-813995-6.00008-X"
              short: "FAO-56"
              author: "Allen et al."
              year: 1998
              institution: "FAO"
              method: "FAO-56 Table 12"
              conditions: "Semi-arid, no stress"
      - name: "development"
        description: "From 10% ground cover to effective full cover"
        parameters:
          - kc: 0.70
            d1: 45
            d2: 105
            mds_ref: 120
            source:
              doi: "10.1016/B978-0-12-813995-6.00008-X"
              short: "FAO-56"
              author: "Allen et al."
              year: 1998
              institution: "FAO"
              method: "FAO-56 Table 12"
              conditions: "Semi-arid, no stress"
      - name: "mid-season"
        description: "From effective full cover to start of maturity"
