# ── Rotation Constraints ─────────────────────────────────────────────────
rotation_constraints:
  - crop_a: "wheat"
    crop_b: "maize"
    interval_years: 1
    reason: "Same pest family (Fusarium spp.)"
    source_short: "JRC MARS"
  - crop_a: "wheat"
    crop_b: "barley"
    interval_years: 1
    reason: "Shared take-all disease (Gaeumannomyces graminis)"
    source_short: "JRC MARS"
  - crop_a: "sunflower"
    crop_b: "sunflower"
    interval_years: 3
    reason: "Sclerotinia sclerotiorum buildup"
    source_short: "JRC MARS"
  - crop_a: "potato"
    crop_b: "potato"
    interval_years: 3
    reason: "Nematode and late blight buildup"
    source_short: "JRC MARS"
  - crop_a: "maize"
    crop_b: "maize"
    interval_years: 1
    reason: "European corn borer pressure"
    source_short: "JRC MARS"
