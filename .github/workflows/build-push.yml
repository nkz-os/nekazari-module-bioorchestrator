name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "*.md"
      - "docs/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/nkz-os/bioorchestrator-backend

jobs:
  # ==========================================================================
  # Test — backend lint + unit tests
  # ==========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: backend
        run: |
          pip install ruff
          ruff check app/ tests/ scripts/

      - name: Run unit tests
        working-directory: backend
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short

  # ==========================================================================
  # Build and push backend Docker image
  # ==========================================================================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================================
  # Auto-bump SHA in k8s deployment (ArgoCD picks it up)
  # ==========================================================================
  auto-bump-sha:
    needs: [build-backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bump backend SHA in k8s
        run: |
          sed -i "s|bioorchestrator-backend:[a-f0-9]\{40\}|bioorchestrator-backend:${{ github.sha }}|g" \
            k8s/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          if git diff --cached --quiet; then
            echo "No SHA change"
          else
            git commit -m "bump(bioorchestrator): ${{ github.sha }}"
            git push
          fi

  # ==========================================================================
  # Summary
  # ==========================================================================
  summary:
    needs: [test, build-backend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ env.BACKEND_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tag suggestion: bump backend/Dockerfile + k8s/deployment.yaml image tag" >> $GITHUB_STEP_SUMMARY

  # Publish MF2 remote via OIDC (push to main only)
  publish-module:
    name: Publish Module
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    uses: nkz-os/nkz/.github/workflows/_publish-module.yml@main
    with:
      module_id: bioorchestrator
    secrets:
      INTERNAL_SERVICE_SECRET: ${{ secrets.INTERNAL_SERVICE_SECRET }}
